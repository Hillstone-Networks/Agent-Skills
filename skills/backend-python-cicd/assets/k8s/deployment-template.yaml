# Kubernetes 部署模板（参考实际集群配置调整）
# 替换占位：APP_NAME、NAMESPACE、IMAGE、CONFIGMAP_ENV、IMAGE_PULL_SECRET、CONTAINER_PORT
# 镜像地址可为 registry.dic.hillstonenet.com/private/<项目名>:latest 或 docker.dic.hillstonenet.com/private/<项目名>:latest（视集群拉取地址而定）
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  namespace: NAMESPACE
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: APP_NAME
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: APP_NAME
    spec:
      containers:
        - name: APP_NAME
          image: IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: CONTAINER_PORT
              protocol: TCP
          envFrom:
            - configMapRef:
                name: CONFIGMAP_ENV
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.86.249.24
          - 10.86.249.42
      imagePullSecrets:
        - name: IMAGE_PULL_SECRET
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: APP_NAME
  namespace: NAMESPACE
spec:
  ports:
    - port: CONTAINER_PORT
      protocol: TCP
      targetPort: CONTAINER_PORT
  selector:
    app: APP_NAME
  type: ClusterIP
